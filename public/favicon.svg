<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>ReactField</title>
  <rect x="4" y="4" width="56" height="56" rx="14" fill="#111111" />

  <!-- Atom mark -->
  <g fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity="0.96">
    <ellipse cx="32" cy="32" rx="18" ry="8.2" />
    <ellipse cx="32" cy="32" rx="18" ry="8.2" transform="rotate(60 32 32)" />
    <ellipse cx="32" cy="32" rx="18" ry="8.2" transform="rotate(-60 32 32)" />
  </g>

  <!-- Nucleus -->
  <circle cx="32" cy="32" r="2.7" fill="#ffffff" />
  <!-- Accent dot -->
  <circle cx="38.8" cy="26.4" r="2.1" fill="#ff5600" />
</svg>
